# Users API Configuration
# Set users_api_enabled=1 to enable HTTPS login against the external API.
# All values are required when enabled.

users_api_enabled=0
users_api_key=changeme
users_api_base_url=https://api.example.com/
users_api_login_path=/api/v1/auth/login
